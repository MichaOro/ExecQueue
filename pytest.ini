[pytest]
testpaths = tests
asyncio_mode = auto
log_level = INFO
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S
addopts = -v --tb=short --maxfail=3 -rs
markers =
    requires_db: test needs a configured external database connection
    integration: marks tests as integration tests (requires external API)
